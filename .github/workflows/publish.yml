name: Publish chiqui-ssg to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    if: github.repository == 'mrmx/Chiqui'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org/'

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter chiqui-ssg check
      - run: pnpm --filter chiqui-ssg build

      - name: Publish to npm
        working-directory: packages/chiqui
        run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: success()
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "## chiqui-ssg@${VERSION}

          **npm:** [\`chiqui-ssg@${VERSION}\`](https://www.npmjs.com/package/chiqui-ssg/v/${VERSION})
          **Install:** \`npm install chiqui-ssg@${VERSION}\`" \
            || echo "Release already exists"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
